<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>flag1 : T</title>
<style>
  :root {
    --bg: #fafafa;
    --text: #1a1a1a;
    --card-bg: rgba(255,255,255,0.9);
    --border: rgba(0,0,0,0.06);
    --grid-line: rgba(0,0,0,0.04);
  }
  .dark {
    --bg: #0d1117;
    --text: #e6edf3;
    --card-bg: rgba(22,27,34,0.9);
    --border: rgba(255,255,255,0.08);
    --grid-line: rgba(255,255,255,0.03);
  }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: var(--bg);
    background-image: 
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 60px 60px;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 2rem;
    padding: 4rem 5rem;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
    backdrop-filter: blur(12px);
    text-align: center;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  h1 {
    font-size: 8rem;
    font-weight: 900;
    margin: 0 0 1rem 0;
    background: linear-gradient(315deg, #63b3ed, #b794f4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 0 40px rgba(99,179,237,0.4);
  }
  .sub {
    font-size: 1.5rem;
    color: var(--text);
    opacity: 0.7;
    letter-spacing: 0.2em;
  }
  .glow-dot {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #63b3ed;
    box-shadow: 0 0 20px #63b3ed;
    margin: 0 0.5rem;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 20px #63b3ed; }
    50% { box-shadow: 0 0 40px #63b3ed, 0 0 80px rgba(99,179,237,0.5); }
  }
</style>
</head>
<body>
  <div class="card">
    <h1>flag1<span class="glow-dot"></span>T</h1>
    <p class="sub">碎片 · 壹</p>
  </div>
</body>
</html>
